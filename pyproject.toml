[project]
name = "google-ai-mode"
version = "0.2.0"
description = "Reverse-proxy Google Search AI Mode as OpenAI-compatible API (pure protocol, no browser)"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "curl_cffi>=0.7",
]

[project.scripts]
google-ai-mode = "google_ai_mode.server:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
