<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Search Scraper MCP Console</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Search Scraper MCP Console</h1>
          <p id="statusText">Loading...</p>
        </div>
        <button id="refreshBtn" type="button">Refresh</button>
      </section>

      <section class="grid">
        <form id="runtimeForm" class="panel">
          <h2>Runtime</h2>
          <label>
            Search provider
            <select name="search_provider">
              <option value="scrapling">Scrapling HTML search</option>
              <option value="gemini_grounding">Gemini + Google Search grounding</option>
              <option value="brave">Brave Search</option>
              <option value="tavily">Tavily</option>
            </select>
          </label>
          <label>
            Gemini API Key
            <input name="gemini_api_key" type="password" autocomplete="off" placeholder="GEMINI_API_KEY">
          </label>
          <label>
            Gemini Model
            <input name="gemini_model" placeholder="gemini-2.5-flash">
          </label>
          <label>
            Brave API Key
            <input name="brave_api_key" type="password" autocomplete="off" placeholder="BRAVE_API_KEY">
          </label>
          <label>
            Tavily API Key
            <input name="tavily_api_key" type="password" autocomplete="off" placeholder="TAVILY_API_KEY">
          </label>
          <label>
            Tavily Search Depth
            <select name="tavily_search_depth">
              <option value="basic">basic</option>
              <option value="advanced">advanced</option>
            </select>
          </label>

          <h2>Scraping</h2>
          <label>
            Backend
            <select name="scrape_backend">
              <option value="scrapling">scrapling</option>
              <option value="scrapling_chromium">scrapling chromium</option>
              <option value="scrapling_stealthy">scrapling stealthy</option>
              <option value="cloakbrowser">cloakbrowser</option>
            </select>
          </label>
          <label class="check">
            <input name="headless" type="checkbox">
            <span>Headless browser scraping</span>
          </label>
          <label>
            Proxy
            <input name="proxy_server" placeholder="socks5://127.0.0.1:7897">
          </label>

          <h2>Web Chat</h2>
          <label>
            Provider for ask
            <select name="web_chat_provider">
              <option value="disabled">disabled</option>
              <option value="deepseek">DeepSeek website</option>
              <option value="chatgpt">ChatGPT website</option>
              <option value="gemini">Gemini website</option>
            </select>
          </label>
          <label>
            Browser backend
            <select name="web_chat_backend">
              <option value="playwright">playwright</option>
              <option value="cloakbrowser">cloakbrowser</option>
            </select>
          </label>
          <label class="check">
            <input name="web_chat_headless" type="checkbox">
            <span>Headless web chat</span>
          </label>
          <label>
            Profile directory
            <input name="web_chat_profile_dir" placeholder="profiles/web-chat/deepseek">
          </label>
          <div class="actions">
            <button type="submit">Apply and restart</button>
            <button id="restartBtn" type="button">Restart only</button>
          </div>
        </form>

        <section class="panel">
          <h2>Test Request</h2>
          <label>
            Prompt
            <textarea id="promptInput" rows="8">latest important AI news today</textarea>
          </label>
          <label>
            Timeout milliseconds
            <input id="timeoutInput" type="number" min="1000" step="1000" value="45000">
          </label>
          <div class="actions">
            <button id="testBtn" type="button">Send test</button>
            <button id="modelsBtn" type="button">Check models</button>
          </div>
        </section>
      </section>

      <section class="panel output-panel">
        <div class="output-head">
          <h2>Output</h2>
          <span id="elapsedText"></span>
        </div>
        <pre id="output"></pre>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
