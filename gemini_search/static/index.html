<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gemini Search MCP Console</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Gemini Search MCP Console</h1>
          <p id="statusText">Loading...</p>
        </div>
        <button id="refreshBtn" type="button">刷新</button>
      </section>

      <section class="grid">
        <form id="runtimeForm" class="panel">
          <h2>运行时配置</h2>
          <label>
            后端
            <select name="browser_backend">
              <option value="playwright">playwright</option>
              <option value="request">request</option>
              <option value="cloakbrowser">cloakbrowser</option>
            </select>
          </label>
          <label>
            浏览器通道
            <select name="channel">
              <option value="chromium">chromium</option>
              <option value="chrome">chrome</option>
              <option value="msedge">msedge</option>
            </select>
          </label>
          <label class="check">
            <input name="headless" type="checkbox">
            <span>无头模式</span>
          </label>
          <label>
            Profile 目录
            <input name="user_data_dir" placeholder="/data/chrome-profile">
          </label>
          <label>
            代理
            <input name="proxy_server" placeholder="socks5://127.0.0.1:7897">
          </label>
          <label>
            本地 CDP URL
            <input name="cdp_url" placeholder="http://127.0.0.1:9222">
          </label>
          <div class="actions">
            <button type="submit">应用并重启</button>
            <button id="restartBtn" type="button">仅重启</button>
          </div>
        </form>

        <section class="panel">
          <h2>测试请求</h2>
          <label>
            Prompt
            <textarea id="promptInput" rows="8">今天有哪些重要 AI 新闻？</textarea>
          </label>
          <label>
            超时毫秒
            <input id="timeoutInput" type="number" min="1000" step="1000" value="45000">
          </label>
          <div class="actions">
            <button id="testBtn" type="button">发送测试</button>
            <button id="modelsBtn" type="button">检查模型</button>
          </div>
        </section>
      </section>

      <section class="panel output-panel">
        <div class="output-head">
          <h2>输出</h2>
          <span id="elapsedText"></span>
        </div>
        <pre id="output"></pre>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
