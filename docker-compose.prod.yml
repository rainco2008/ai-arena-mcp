services:
  gemini-search:
    build: .
    restart: unless-stopped
    shm_size: "2gb"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    expose:
      - "8080"
    environment:
      PYTHONUNBUFFERED: "1"
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      HEADLESS: "1"
      GEMINI_SEARCH_PROVIDER: ${GEMINI_SEARCH_PROVIDER:-scrapling}
      GEMINI_SEARCH_SCRAPE_BACKEND: ${GEMINI_SEARCH_SCRAPE_BACKEND:-scrapling}
      WEB_CHAT_PROVIDER: ${WEB_CHAT_PROVIDER:-disabled}
      WEB_CHAT_BACKEND: ${WEB_CHAT_BACKEND:-playwright}
      WEB_CHAT_HEADLESS: ${WEB_CHAT_HEADLESS:-1}
      WEB_CHAT_PROFILE_DIR: ${WEB_CHAT_PROFILE_DIR:-/data/web-chat}
      GEMINI_SEARCH_PROXY_SERVER: ${GEMINI_SEARCH_PROXY_SERVER:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_SEARCH_DEPTH: ${TAVILY_SEARCH_DEPTH:-basic}
    volumes:
      - ./data:/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/London}
      TZ: ${TZ:-Europe/London}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_HOST: ${N8N_HOST:-n8n.${DOMAIN}}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.${DOMAIN}/}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./data:/data
    depends_on:
      - gemini-search

  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      N8N_MODE: "true"
      MCP_MODE: "http"
      N8N_API_URL: ${N8N_API_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      WEBHOOK_SECURITY_MODE: ${N8N_MCP_WEBHOOK_SECURITY_MODE:-permissive}
      MCP_AUTH_TOKEN: ${N8N_MCP_AUTH_TOKEN}
      AUTH_TOKEN: ${N8N_MCP_AUTH_TOKEN}
      PORT: "3000"
      LOG_LEVEL: ${N8N_MCP_LOG_LEVEL:-info}
    depends_on:
      - n8n
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - gemini-search
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      N8N_DOMAIN: ${N8N_DOMAIN:-n8n.${DOMAIN}}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  n8n-data:
  caddy-data:
  caddy-config:
