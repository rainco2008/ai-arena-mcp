services:
  contentpilot:
    build: .
    restart: unless-stopped
    shm_size: "2gb"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    expose:
      - "8080"
    environment:
      PYTHONUNBUFFERED: "1"
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      CONTENTPILOT_DATABASE_URL: ${CONTENTPILOT_DATABASE_URL:-postgresql://postgres:Postgres2024%40%23@192.168.0.46:5433/contentpilot}
      CONTENT_FACTORY_DATABASE_URL: ${CONTENT_FACTORY_DATABASE_URL:-postgresql://postgres:Postgres2024%40%23@192.168.0.46:5433/contentpilot}
      HEADLESS: "1"
      GEMINI_SEARCH_PROVIDER: ${GEMINI_SEARCH_PROVIDER:-scrapling}
      GEMINI_SEARCH_SCRAPE_BACKEND: ${GEMINI_SEARCH_SCRAPE_BACKEND:-scrapling}
      WEB_CHAT_PROVIDER: ${WEB_CHAT_PROVIDER:-disabled}
      WEB_CHAT_BACKEND: ${WEB_CHAT_BACKEND:-playwright}
      WEB_CHAT_HEADLESS: ${WEB_CHAT_HEADLESS:-1}
      WEB_CHAT_PROFILE_DIR: ${WEB_CHAT_PROFILE_DIR:-/data/web-chat}
      GEMINI_SEARCH_PROXY_SERVER: ${GEMINI_SEARCH_PROXY_SERVER:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_SEARCH_DEPTH: ${TAVILY_SEARCH_DEPTH:-basic}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  contentpilot-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      CONTENTPILOT_DATABASE_URL: ${CONTENTPILOT_DATABASE_URL:-postgresql://postgres:Postgres2024%40%23@192.168.0.46:5433/contentpilot}
      CONTENTPILOT_API_URL: http://contentpilot:8080
      CONTENTPILOT_ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      N8N_API_URL: http://n8n:5678
      N8N_WEB_URL: ${N8N_WEB_URL:-https://n8n.${DOMAIN}}
      NODE_ENV: production
    volumes:
      - ./data:/app/data
    depends_on:
      contentpilot:
        condition: service_healthy
      n8n:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/London}
      TZ: ${TZ:-Europe/London}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_HOST: ${N8N_HOST:-n8n.${DOMAIN}}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.${DOMAIN}/}
      CONTENTPILOT_DATABASE_URL: ${CONTENTPILOT_DATABASE_URL:-postgresql://postgres:Postgres2024%40%23@192.168.0.46:5433/contentpilot}
      CONTENT_FACTORY_DATABASE_URL: ${CONTENT_FACTORY_DATABASE_URL:-postgresql://postgres:Postgres2024%40%23@192.168.0.46:5433/contentpilot}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./data:/data
    depends_on:
      - contentpilot
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5678/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      contentpilot-web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      N8N_DOMAIN: ${N8N_DOMAIN:-n8n.${DOMAIN}}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  n8n-data:
  caddy-data:
  caddy-config:
